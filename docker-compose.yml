services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    # Mount local data/model/shapefile directories for easy replacement & persistence
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/shapefiles:/app/shapefiles
    ports:
      - "8000:8000"   # Optional: allows direct backend debugging
    # Add timezone or environment variables here if needed:
    # environment:
    #   - TZ=Asia/Singapore

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"
