services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    volumes:
      # Persist project data and input folders outside the container
      - ./data:/app/data
      - ./in:/app/in
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
